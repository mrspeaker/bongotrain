<!DOCTYPE html>
<html>
    <head>
        <style>
            body {
                background-color: #222;
            }
            canvas {
                background-color: #000;
                image-rendering: pixelated;
                image-rendering: crisp-edges;
            }
            input,
            textarea {
                vertical-align: top;
            }
            .controls {
                color: #fff;
            }
        </style>
    </head>
    <body>
        <div>
            <canvas id="board" width="256" height="256"></canvas>
        </div>
        <div class="controls">
            level:
            <button id="level-prev">&#9664; prev</button>
            <span id="level-label"></span>
            <button id="level-next">next &#9654;</button>
        </div>
        <div>
            <canvas id="level" width="232" height="256"></canvas>
        </div>
        <div class="controls">
            song:
            <select id="notes"></select
            ><button id="play">play</button><button id="stop">stop</button>
            <br />
            unused:
            <select id="unused"></select
            ><button id="play-unused">play</button>
        </div>
        <script type="module" src="./bongo.js"></script>
    </body>
</html>
